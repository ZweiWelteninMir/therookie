<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rookie | Official Fanpage</title>
    <style>
        :root {
            --accent: #f0a500; /* LAPD Gold */
            --bg-dark: #02060c;
            --glass: rgba(0, 0, 0, 0.6);
            --glass-blur: blur(12px);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden; /* Absolutes Scroll-Verbot */
        }

        /* Hintergrundbild mit dem gewünschten Link */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.7)),
                        url('https://i.pinimg.com/1200x/ac/32/96/ac329644df131e26c3c39c267aee64ad.jpg');
            background-size: cover;
            background-position: center 20%;
            z-index: -1;
            transform: scale(1.05); /* Verhindert weiße Ränder beim Blur */
        }

        /* Haupt-Inhalt */
        .overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            backdrop-filter: brightness(0.8);
        }

        .hero-section {
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .badge-top {
            background: var(--accent);
            color: black;
            padding: 4px 15px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: inline-block;
            border-radius: 2px;
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 8rem);
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: -3px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Navigation Buttons */
        .nav-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 900px;
            animation: fadeInUp 1s ease-out 0.3s backwards;
        }

        .nav-btn {
            background: var(--glass);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:hover {
            border-color: var(--accent);
            background: rgba(240, 165, 0, 0.1);
            transform: translateY(-10px);
        }

        .nav-btn span {
            display: block;
            font-size: 0.65rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .nav-btn strong {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Deko-Elemente */
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            opacity: 0.3;
            box-shadow: 0 0 15px var(--accent);
            animation: scan 4s linear infinite;
        }

        /* Animationen */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* Mobile Anpassung */
        @media (max-width: 768px) {
            .nav-container {
                grid-template-columns: repeat(2, 1fr);
            }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="scanner-line"></div>

    <div class="overlay">
        <div class="hero-section">
            <div class="badge-top">L.A. Police Department</div>
            <h1>THE<br>ROOKIE</h1>
        </div>

        <div class="nav-container">
            <a href="#" class="nav-btn">
                <span>Database 01</span>
                <strong>Handlung</strong>
            </a>
            <a href="#" class="nav-btn">
                <span>Database 02</span>
                <strong>Charaktere</strong>
            </a>
            <a href="#" class="nav-btn">
                <span>Database 03</span>
                <strong>Equipment</strong>
            </a>
            <a href="#" class="nav-btn">
                <span>Database 04</span>
                <strong>Einsatzort</strong>
            </a>
        </div>
    </div>

</body>
</html>
