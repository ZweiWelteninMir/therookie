<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rookie | Entry</title>
    <style>
        /* Modernes Reset & Variablen */
        :root {
            --accent: #f0a500;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden; /* Verhindert Scrollen */
        }

        /* Hintergrund mit dramatischem Look */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(5, 10, 20, 0.4), rgba(5, 10, 20, 0.9)),
                        url('https://images.unsplash.com/photo-1517404215738-15263e9f9178?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: grayscale(20%) brightness(70%);
        }

        /* Full Screen Container */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        /* Glassmorphism Badge */
        .badge {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
            animation: slideDown 1s ease-out;
        }

        /* Haupt-Titel im Banner-Stil */
        .title-group {
            position: relative;
            margin-bottom: 30px;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 7rem); /* Responsive Schriftgröße */
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.9;
            text-transform: uppercase;
            margin: 0;
            animation: scaleUp 1.2s ease-out;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ccc;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 10px;
            display: block;
            opacity: 0.8;
        }

        /* Navigation / Info Cards unten */
        .bottom-nav {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            animation: fadeInUp 1.5s ease-out;
        }

        .nav-item {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .nav-item h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 5px;
        }

        /* Animationen */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Kleine LAPD-Streifen Deko */
        .police-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #002d72 50%, var(--accent) 50%);
            background-size: 100px 100%;
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>

    <div class="container">
        <div class="badge">Mid-Wilshire Division | LAPD</div>
        
        <div class="title-group">
            <h1>The<br>Rookie</h1>
            <span class="subtitle">To Protect and Serve</span>
        </div>

        <div class="bottom-nav">
            <a href="#" class="nav-item">
                <h3>01</h3>
                <p>Charaktere</p>
            </a>
            <a href="#" class="nav-item">
                <h3>02</h3>
                <p>Einsatzorte</p>
            </a>
            <a href="#" class="nav-item">
                <h3>03</h3>
                <p>Equipment</p>
            </a>
        </div>
    </div>

    <div class="police-line"></div>

</body>
</html>
